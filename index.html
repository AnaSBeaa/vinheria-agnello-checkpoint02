<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinheria Agnello</title>
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>

  <main class="container">
    <section class="card">
      <h1>Vinheria Agnello</h1>

      <p class="descricao">
        Sistema simples de cadastro de vinhos
      </p>

      <p>
        Ao carregar a página, você poderá cadastrar um vinho informando
        nome, tipo, safra, estoque, valor de custo e valor de venda.
      </p>

      <div class="info">
        <h3>Dados coletados:</h3>
        <ul>
          <li>Nome do vinho</li>
          <li>Tipo</li>
          <li>Safra</li>
          <li>Estoque</li>
          <li>Valor de custo</li>
          <li>Valor de venda</li>
        </ul>
      </div>
    </section>
  </main>

  <script src="src/js/script.js"></script>
</body>
</html>
